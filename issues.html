<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- DaisyUI + TailwindCSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.6.0/dist/full.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Geist", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="bg-gray-100 min-h-screen font-sans">
    <!--  Navigation bar -->
    <nav
      class="bg-white shadow-sm px-4 py-3 flex items-center justify-between gap-2 sticky top-0 z-10"
    >
      <!-- Website logo & title -->
      <div class="flex items-center gap-2 shrink-0 min-w-0">
        <img
          src="assets/github-logo.png"
          alt="GitHub Logo"
          class="w-7 h-7 shrink-0"
        />
        <span class="font-bold text-base sm:text-lg text-gray-800 truncate">
          GitHub Issues Tracker
        </span>
      </div>
      <!-- Search bar and new issue button -->
      <div class="flex items-center gap-2 shrink-0">
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"
              />
            </svg>
          </span>
          <!-- Search input -->
          <input
            type="text"
            id="search-input"
            placeholder="Search..."
            class="input input-bordered input-sm pl-9 w-32 sm:w-48 md:w-64 bg-white text-gray-800"
            oninput="handleSearch(this.value)"
          />
        </div>
        <!-- New issue button -->
        <button class="btn btn-primary btn-sm text-white gap-1 shrink-0">
          <span class="text-lg font-bold leading-none">+</span>
          <span class="hidden sm:inline">New Issue</span>
        </button>
      </div>
    </nav>
    <div class="max-w-6xl mx-auto px-4 py-6">
      <!-- Issue filter tabs -->
      <div class="bg-white rounded-xl shadow-sm px-4 py-3 mb-4 flex gap-3">
        <button
          id="tab-all"
          onclick="switchTab('all')"
          class="btn btn-sm btn-primary text-white px-5"
        >
          All
        </button>
        <button
          id="tab-open"
          onclick="switchTab('open')"
          class="btn btn-sm btn-ghost border border-gray-200 bg-white text-gray-700 px-5"
        >
          Open
        </button>
        <button
          id="tab-closed"
          onclick="switchTab('closed')"
          class="btn btn-sm btn-ghost border border-gray-200 bg-white text-gray-700 px-5"
        >
          Closed
        </button>
      </div>
      <div
        class="bg-white rounded-xl shadow-sm px-6 py-4 mb-6 flex items-center justify-between"
      >
        <!-- Issue count -->
        <div class="flex items-center gap-3">
          <div
            class="w-12 h-12 rounded-full bg-purple-100 flex items-center justify-center"
          >
            <img src="assets/Aperture.png" alt="Issues Icon" class="w-7 h-7" />
          </div>
          <div>
            <h2 class="text-xl font-bold text-gray-800" id="issue-count">
              0 Issues
            </h2>
            <p class="text-gray-400 text-sm">
              Track and manage your project issues
            </p>
          </div>
        </div>
        <!-- Open & closed indicators -->
        <div class="flex items-center gap-4 text-sm text-gray-700 font-medium">
          <span class="flex items-center gap-2">
            <span class="w-3 h-3 rounded-full bg-green-500 inline-block"></span>
            Open
          </span>
          <span class="flex items-center gap-2">
            <span
              class="w-3 h-3 rounded-full bg-purple-500 inline-block"
            ></span>
            Closed
          </span>
        </div>
      </div>
      <!-- Loading spinner -->
      <div id="loading" class="flex justify-center items-center py-20">
        <span class="loading loading-spinner loading-lg text-primary"></span>
      </div>
      <!-- Issues cards grid -->
      <div
        id="issues-grid"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 hidden"
      ></div>
      <!-- Message no issue found -->
      <div
        id="no-results"
        class="hidden text-center text-gray-400 py-20 text-lg"
      >
        No issues found.
      </div>
    </div>
    <!-- Issue details modal -->
    <dialog id="issue-modal" class="modal">
      <div class="modal-box max-w-lg bg-white text-gray-800">
        <h3 class="font-bold text-xl text-gray-800 mb-2" id="modal-title"></h3>
        <div
          class="flex flex-wrap items-center gap-2 mb-4 text-sm text-gray-500"
        >
          <span
            id="modal-status-badge"
            class="badge text-white font-semibold px-3 py-1 rounded-full"
          ></span>
          <span>
            • Opened by
            <span id="modal-author" class="font-medium text-gray-700"></span>
          </span>
          <span>• <span id="modal-date"></span></span>
        </div>
        <div class="flex flex-wrap gap-2 mb-4" id="modal-labels"></div>
        <p class="text-gray-600 mb-5" id="modal-description"></p>
        <div class="grid grid-cols-2 gap-4 bg-gray-50 rounded-lg p-4 mb-5">
          <div>
            <p class="text-xs text-gray-400 mb-1">Assignee:</p>
            <p class="font-semibold text-gray-700" id="modal-assignee">—</p>
          </div>
          <div>
            <p class="text-xs text-gray-400 mb-1">Priority:</p>
            <span
              id="modal-priority-badge"
              class="badge text-white font-semibold px-3"
            ></span>
          </div>
        </div>
        <!-- Modal close button -->
        <div class="modal-action">
          <button
            onclick="document.getElementById('issue-modal').close()"
            class="btn btn-primary text-white"
            style="padding: 8px 28px; font-size: 14px"
          >
            Close
          </button>
        </div>
      </div>
      <!-- Modal backdrop -->
      <form method="dialog" class="modal-backdrop">
        <button>close</button>
      </form>
    </dialog>
    <script src="issues.js"></script>
  </body>
</html>
